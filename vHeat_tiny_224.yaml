MODEL:
  TYPE: vheat
  NAME: vheat_tiny_224_phr_fdr
  DROP_PATH_RATE: 0.1

  VHEAT:
    EMBED_DIM: 96
    DIMS: [96, 192, 384, 768]
    DEPTHS: [2, 2, 6, 2]
    POST_NORM: false

  REDUNDANCY:
    PHR:
      ENABLE: true
      MODE: stage
      HEAT_RATIO: 1.0
      STAGE_HEAT_RATIOS: [0.5, 0.5, 0.625, 0.75]
      LIGHT_BRANCH: dwconv

    FDR:
      ENABLE: true
      MODE: stage
      KEEP_RATIO: 0.7
      STAGE_KEEP_RATIOS: [1.0, 1.0, 0.8, 0.6]

TRAIN:
  BASE_LR: 5.e-4
  WEIGHT_DECAY: 0.08

DATA:
  IMG_SIZE: 224
  VAL_HAS_LABELS: true

OUTPUT: /root/output/vheat_tiny_224_phr_fdr
TAG: vheat_tiny_224_phr_fdr
